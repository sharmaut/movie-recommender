version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movieapp
      POSTGRES_USER: movieapp
      POSTGRES_PASSWORD: movieapp123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movieapp
      SPRING_DATASOURCE_USERNAME: movieapp
      SPRING_DATASOURCE_PASSWORD: movieapp123
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      - postgres

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: movie-recommender
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - ml-service

volumes:
  postgres_data: